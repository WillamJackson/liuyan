<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="utf-8" />
  <link rel="shortcut icon"
    href="https://static-index-4gtuqm3bfa95c963-1304825656.tcloudbaseapp.com/official-website/favicon.svg"
    type="image/x-icon" />
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <title>职场分享社区 - 内容发布系统</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Droid Sans", "Helvetica Neue", "PingFang SC", "Hiragino Sans GB", "Droid Sans Fallback", "Microsoft YaHei", sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .main-container {
      background: white;
      border-radius: 20px;
      padding: 3rem;
      box-shadow: 0 20px 40px rgba(0,0,0,0.1);
      text-align: center;
      max-width: 500px;
      width: 90%;
    }

    .logo {
      width: 80px;
      height: 80px;
      margin-bottom: 1.5rem;
    }

    .title {
      font-size: 2rem;
      font-weight: 600;
      color: #333;
      margin-bottom: 0.5rem;
    }

    .subtitle {
      color: #666;
      margin-bottom: 2rem;
      font-size: 1.1rem;
    }

    .admin-btn {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border: none;
      color: white;
      padding: 15px 40px;
      font-size: 1.1rem;
      border-radius: 50px;
      transition: all 0.3s ease;
      text-decoration: none;
      display: inline-block;
      margin: 10px;
      box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
    }

    .admin-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(102, 126, 234, 0.6);
      color: white;
    }

    .feature-list {
      text-align: left;
      margin: 2rem 0;
      padding: 1.5rem;
      background: #f8f9fa;
      border-radius: 10px;
    }

    .feature-item {
      display: flex;
      align-items: center;
      margin-bottom: 0.8rem;
      color: #555;
    }

    .feature-item:last-child {
      margin-bottom: 0;
    }

    .feature-icon {
      color: #667eea;
      margin-right: 10px;
      width: 20px;
    }

    .stats {
      display: flex;
      justify-content: space-around;
      margin: 2rem 0;
      padding: 1rem;
      background: #f8f9fa;
      border-radius: 10px;
    }

    .stat-item {
      text-align: center;
    }

    .stat-number {
      font-size: 1.5rem;
      font-weight: bold;
      color: #667eea;
    }

    .stat-label {
      font-size: 0.9rem;
      color: #666;
    }

    .footer-text {
      margin-top: 2rem;
      color: #999;
      font-size: 0.9rem;
    }

    @media (max-width: 768px) {
      .main-container {
        padding: 2rem 1.5rem;
      }
      
      .title {
        font-size: 1.5rem;
      }
      
      .admin-btn {
        padding: 12px 30px;
        font-size: 1rem;
      }
    }
  </style>
</head>

<body>
  <div class="main-container">
    <img class="logo"
      src="https://static-index-4gtuqm3bfa95c963-1304825656.tcloudbaseapp.com/official-website/favicon.svg"
      alt="Logo" />
    
    <h1 class="title">职场分享社区</h1>
    <p class="subtitle">内容发布管理系统</p>
    
    <!-- 功能特性 -->
    <div class="feature-list">
      <div class="feature-item">
        <i class="fas fa-edit feature-icon"></i>
        <span>富媒体内容发布（图片、视频、文档）</span>
      </div>
      <div class="feature-item">
        <i class="fas fa-hashtag feature-icon"></i>
        <span>话题标签系统，支持热门话题</span>
      </div>
      <div class="feature-item">
        <i class="fas fa-link feature-icon"></i>
        <span>链接分享功能，自动预览</span>
      </div>
      <div class="feature-item">
        <i class="fas fa-search feature-icon"></i>
        <span>全文搜索，智能分类管理</span>
      </div>
      <div class="feature-item">
        <i class="fas fa-chart-bar feature-icon"></i>
        <span>数据统计，内容分析</span>
      </div>
    </div>

    <!-- 系统状态 -->
    <div class="stats">
      <div class="stat-item">
        <div class="stat-number" id="categoryCount">6</div>
        <div class="stat-label">内容分类</div>
      </div>
      <div class="stat-item">
        <div class="stat-number" id="topicCount">8</div>
        <div class="stat-label">话题标签</div>
      </div>
      <div class="stat-item">
        <div class="stat-number" id="postCount">0</div>
        <div class="stat-label">发布内容</div>
      </div>
    </div>
    
    <!-- 管理入口 -->
    <div style="margin: 2rem 0;">
      <a href="/admin" class="admin-btn">
        <i class="fas fa-cog me-2"></i>进入管理后台
      </a>
      <br>
      <a href="/admin/posts/create" class="admin-btn" style="background: linear-gradient(135deg, #10b981 0%, #059669 100%); box-shadow: 0 4px 15px rgba(16, 185, 129, 0.4);">
        <i class="fas fa-plus me-2"></i>立即发布内容
      </a>
    </div>

    <!-- API文档链接 -->
    <div style="margin-top: 1.5rem;">
      <small>
        <a href="/api/posts" style="color: #667eea; text-decoration: none;" target="_blank">
          <i class="fas fa-code me-1"></i>API接口文档
        </a>
        <span style="margin: 0 10px; color: #ddd;">|</span>
        <a href="/api/categories" style="color: #667eea; text-decoration: none;" target="_blank">
          <i class="fas fa-tags me-1"></i>分类接口
        </a>
        <span style="margin: 0 10px; color: #ddd;">|</span>
        <a href="/api/topics" style="color: #667eea; text-decoration: none;" target="_blank">
          <i class="fas fa-hashtag me-1"></i>话题接口
        </a>
      </small>
    </div>

    <p class="footer-text">
      基于微信云开发Flask模板构建<br>
      支持Telegram频道式富媒体内容分享
    </p>
  </div>

  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script>
    // 加载统计数据
    $(document).ready(function() {
      // 获取内容数量
      $.get('/api/posts?per_page=1', function(data) {
        if (data.code === 0 && data.data.pagination) {
          $('#postCount').text(data.data.pagination.total);
        }
      }).fail(function() {
        $('#postCount').text('N/A');
      });

      // 获取分类数量
      $.get('/api/categories', function(data) {
        if (data.code === 0 && data.data) {
          $('#categoryCount').text(data.data.length);
        }
      }).fail(function() {
        $('#categoryCount').text('N/A');
      });

      // 获取话题数量
      $.get('/api/topics', function(data) {
        if (data.code === 0 && data.data) {
          $('#topicCount').text(data.data.length);
        }
      }).fail(function() {
        $('#topicCount').text('N/A');
      });
    });

    // 添加页面加载动画
    $(window).on('load', function() {
      $('.main-container').css({
        'opacity': '0',
        'transform': 'translateY(30px)'
      }).animate({
        'opacity': '1',
        'transform': 'translateY(0)'
      }, 800);
    });
  </script>
</body>
</html>
